# Build Vite output to dist/ and publish to GitHub Pages.
#
# REQUIRED — GitHub: Settings → Pages → Build and deployment → Source = "GitHub Actions".
# If Source is still "Deploy from a branch" + folder "/ (root)", the site serves this repo’s
# source index.html (with /src/main.tsx) → MIME errors. Switch to GitHub Actions only.
#
# BASE URL (vite.config.ts):
# - Custom domain at site root (e.g. CNAME nytsu.com): do NOT set PAGES_BASE (default "/").
# - Only the default URL https://<owner>.github.io/<repo>/: set repo variable PAGES_BASE to "/<repo>/"
#   (Settings → Secrets and variables → Actions → Variables → PAGES_BASE).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm@8.15.0)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Empty/unset → Vite base "/". Set PAGES_BASE only for *.github.io/<repo>/ URLs.
          GITHUB_PAGES_BASE: ${{ vars.PAGES_BASE }}

      - name: Verify production HTML (not dev index)
        run: |
          if grep -qE 'src="/src/main\.tsx"|src=./src/main\.tsx' dist/index.html; then
            echo "::error::dist/index.html still points at main.tsx — use Vite build output only."
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
