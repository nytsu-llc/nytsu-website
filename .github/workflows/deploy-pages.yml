# Build Vite output to dist/ and publish to GitHub Pages.
# Fixes "MIME type application/octet-stream" for main.tsx: deploy compiled JS, not source.
#
# Setup (repo → Settings → Pages): Source = GitHub Actions.
#
# If the site is served at your domain root (custom domain or *.github.io user/org repo),
# remove the GITHUB_PAGES_BASE env block below so base stays "/".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # https://<owner>.github.io/<repo>/ — must match Vite base
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
